<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>Windows Battery Manager</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="app">
    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="app-logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="13" height="13" fill="#11D8E8"/>
            <rect x="15" width="13" height="13" fill="#11D8E8" opacity="0.6"/>
            <rect y="15" width="13" height="13" fill="#11D8E8" opacity="0.6"/>
            <rect x="15" y="15" width="13" height="13" fill="#11D8E8"/>
          </svg>
        </div>
        <div class="app-name">
          <span class="app-name-main">Windows</span>
          <span class="app-name-sub">Battery Manager</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="dashboard">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/>
          </svg>
          <span>대시보드</span>
        </button>
        <button class="nav-item" data-view="battery-health">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M2 11a1 1 0 011-1h2V9a1 1 0 012 0v1h1a1 1 0 110 2H7v1a1 1 0 11-2 0v-1H3a1 1 0 01-1-1zm10-4a1 1 0 10-2 0v1H9a1 1 0 100 2h1v1a1 1 0 102 0v-1h1a1 1 0 100-2h-1V7zM9 17a1 1 0 011-1h.01a1 1 0 110 2H10a1 1 0 01-1-1z"/>
          </svg>
          <span>배터리 헬스</span>
        </button>
        <button class="nav-item" data-view="recent-activity">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3zm11 4a1 1 0 10-2 0v4a1 1 0 102 0V7zm-3 1a1 1 0 10-2 0v3a1 1 0 102 0V8zM8 9a1 1 0 00-2 0v2a1 1 0 102 0V9z" clip-rule="evenodd"/>
          </svg>
          <span>최근 활동</span>
        </button>
        <button class="nav-item" data-view="battery-usage">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M13 7H7v6h6V7z"/>
            <path fill-rule="evenodd" d="M7 2a1 1 0 012 0v1h2V2a1 1 0 112 0v1h2a2 2 0 012 2v2h1a1 1 0 110 2h-1v2h1a1 1 0 110 2h-1v2a2 2 0 01-2 2h-2v1a1 1 0 11-2 0v-1H9v1a1 1 0 11-2 0v-1H5a2 2 0 01-2-2v-2H2a1 1 0 110-2h1V9H2a1 1 0 010-2h1V5a2 2 0 012-2h2V2zM5 5h10v10H5V5z" clip-rule="evenodd"/>
          </svg>
          <span>배터리 소모</span>
        </button>
        <button class="nav-item" data-view="usage-history">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/>
          </svg>
          <span>사용 이력</span>
        </button>
        <button class="nav-item" data-view="estimates">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/>
            <path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/>
          </svg>
          <span>수명 예측</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button id="refresh-btn" class="refresh-btn" title="새 리포트 생성">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/>
          </svg>
          새로 고침
        </button>
        <button id="load-file-btn" class="load-file-btn" title="HTML 파일 불러오기">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
          </svg>
          파일 열기
        </button>
      </div>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="main-content">
      <!-- 로딩 오버레이 -->
      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
        <p class="loading-text">배터리 리포트 생성 중...</p>
        <p class="loading-sub">powercfg /batteryreport 실행 중</p>
      </div>

      <!-- 에러 화면 -->
      <div id="error-screen" class="error-screen hidden">
        <div class="error-icon">⚠</div>
        <h2 class="error-title">리포트 생성 실패</h2>
        <p id="error-message" class="error-message"></p>
        <button id="retry-btn" class="btn-primary">다시 시도</button>
      </div>

      <!-- 뷰 컨테이너 -->
      <div id="view-container" class="hidden"></div>
    </main>
  </div>

  <script src="lib/chart.umd.js"></script>
  <script src="views/dashboard.js"></script>
  <script src="views/batteryHealth.js"></script>
  <script src="views/recentActivity.js"></script>
  <script src="views/batteryUsage.js"></script>
  <script src="views/usageHistory.js"></script>
  <script src="views/estimates.js"></script>
  <script src="app.js"></script>
</body>
</html>
